name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ""
          POSTGRES_DB: credit_risk
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Load database schema
        run: |
          sudo apt-get install -y postgresql-client
          psql -h localhost -U postgres -d credit_risk -c "CREATE TABLE credit_data (amt_income_total NUMERIC, amt_credit NUMERIC, amt_goods_price NUMERIC, days_birth INTEGER, days_employed NUMERIC, income_credit_ratio NUMERIC, employment_age_ratio NUMERIC, annuity_income_ratio NUMERIC, bur_total_debt NUMERIC, bur_num_credits NUMERIC, bur_max_overdue NUMERIC, prev_num_applications NUMERIC, prev_approval_rate NUMERIC, inst_late_rate NUMERIC, inst_days_late_mean NUMERIC, cc_utilisation NUMERIC, cc_dpd_max NUMERIC, pos_sk_dpd_max NUMERIC, pos_completion_rate NUMERIC, target NUMERIC);"

      - name: Run all tests (pytest and dbt)
        run: make test-all
